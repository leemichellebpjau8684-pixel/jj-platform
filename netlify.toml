# Netlify 配置文件
# 用于配置环境变量和构建设置

[build]
  command = "npm run build"
  publish = "dist"

# ⚠️ 重要安全提示：
# 
# 不要在这里配置敏感信息（如管理员密码）！
# netlify.toml 文件会被提交到 Git，所有人都能看到。
#
# 正确做法：
# 1. 登录 Netlify 后台
# 2. 选择你的站点
# 3. 进入 Site settings → Environment variables
# 4. 添加环境变量：
#    - Key: VITE_ADMIN_PASSWORD
#    - Value: 你的管理员密码
# 5. 重新部署站点
#
# 这样密码就不会被打包到前端代码中，也不会暴露给访问者。

[build.environment]
  # Node.js 版本
  NODE_VERSION = "18"

# 生产环境变量配置（仅用于说明，实际请在 Netlify 后台配置）
# [context.production.environment]
#   VITE_ADMIN_PASSWORD = "your_production_password_here"

# 预览环境变量配置（仅用于说明，实际请在 Netlify 后台配置）
# [context.deploy-preview.environment]
#   VITE_ADMIN_PASSWORD = "your_preview_password_here"